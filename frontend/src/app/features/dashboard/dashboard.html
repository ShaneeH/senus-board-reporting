<h1>Board Performance Dashboard</h1>

<!-- This Panel is Reserved for the KPI Cards -->
<p class="subtitle">Executive summary of key financial indicators</p>

<div class="metrics-grid">
  @for (metric of metrics; track metric.title) {
    <app-metric-card [title]="metric.title" [value]="metric.value" [trend]="metric.trend">
    </app-metric-card>
  }
</div>

<!-- This Panel is Reserved for the Revenue Charts -->
<div class="dashboard-grid">
  <section class="panel">
    <h2>Revenue Trend</h2>

    @if (financialData) {
      <app-revenue-chart [financialData]="financialData"> </app-revenue-chart>
    }
  </section>

  <!-- This Panel is Reserved for the AI Insigths-->
  <section class="panel">
    <app-ai-insights [insights]="insights"> </app-ai-insights>
  </section>
</div>
